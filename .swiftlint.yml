disabled_rules:
  - nesting        # Nested response/capability types inside actors are intentional
  - trailing_comma # Dictionary literals in this project use trailing commas consistently

opt_in_rules:
  - empty_collection_literal
  - empty_count
  - sorted_imports

excluded:
  - GoveeBar.xcodeproj

identifier_name:
  min_length: 1
  excluded:
    - i   # Array index
    - r   # RGB red channel
    - g   # RGB green channel
    - b   # RGB blue channel
    - ip  # IP address (networking convention)
    - on  # Power state parameter (on/off)
    - id  # Standard identifier

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 800

line_length:
  warning: 130
  error: 200
  ignores_comments: true
  ignores_urls: true
