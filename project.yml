name: GoveeBar
options:
  bundleIdPrefix: com.govee-bar
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

targets:
  GoveeBar:
    type: application
    platform: macOS
    sources:
      - path: GoveeBar
        excludes:
          - Info.plist
          - GoveeBar.entitlements
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed — run 'brew install swiftlint'"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.govee-bar.GoveeBar
        PRODUCT_NAME: Govee Bar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        CODE_SIGN_ENTITLEMENTS: GoveeBar/GoveeBar.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_EMIT_LOC_STRINGS: YES
